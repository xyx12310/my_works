<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系方式 | 设计师作品集</title>
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* 颜色变量 */
            --primary-color: #f8f9fa;
            --secondary-color: #e9ecef;
            --accent-color: #6c757d;
            --text-color: #343a40;
            --light-text: #6c757d;
            --border-color: #dee2e6;
            --gradient-start: #f8f9fa;
            --gradient-end: #e9ecef;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            overflow-x: hidden;
        }
        
        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: all 0.3s ease;
            padding: 20px 0;
        }
        
        .navbar.scrolled {
            background: rgba(248, 249, 250, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            padding: 15px 0;
        }
        
        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo span {
            font-size: 14px;
            font-weight: 400;
            color: var(--light-text);
        }
        
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 40px;
        }
        
        .nav-menu li a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 8px;
        }
        
        .nav-menu li a:hover,
        .nav-menu li a.active {
            color: var(--accent-color);
        }
        
        .nav-menu li a.active {
            background-color: var(--secondary-color);
        }
        
        .hamburger {
            display: none;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-color);
        }
        
        /* 页面标题区 */
        .page-header {
            padding: 150px 0 80px;
            text-align: center;
        }
        
        .page-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        .page-desc {
            font-size: 16px;
            color: var(--light-text);
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* 联系信息区 */
        .contact-section {
            padding: 40px 0 80px;
        }
        
        .contact-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .availability {
            text-align: center;
            margin-bottom: 60px;
            padding: 20px;
            background-color: rgba(108, 117, 141, 0.1);
            border-radius: 8px;
        }
        
        .availability-text {
            font-size: 16px;
            color: var(--light-text);
        }
        
        .availability-status {
            color: var(--accent-color);
            font-weight: 600;
        }
        
        .contact-list {
            list-style: none;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .contact-item:last-child {
            border-bottom: none;
        }
        
        .contact-icon {
            font-size: 32px;
            color: var(--light-text);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .contact-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .email-icon {
            position: relative;
            cursor: pointer;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            will-change: transform, opacity;
        }

        .email-icon img {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
            transform: translateZ(0);
        }

        .email-icon .email-open {
            opacity: 0;
            transform: scale(0.85) translateZ(0);
        }

        .email-icon:hover .email-open {
            opacity: 1;
            transform: scale(1) translateY(-4px) translateZ(0);
        }

        .email-icon:hover .email-closed {
            opacity: 0;
            transform: scale(0.9) translateZ(0);
        }

        .phone-icon {
            position: relative;
            cursor: pointer;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            will-change: transform;
        }

        .phone-icon img {
            transform: translateZ(0);
        }

        .phone-icon:hover img {
            animation: phoneShake 0.8s ease-in-out infinite;
        }

        .sound-wave {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 3px;
            height: 6px;
            background-color: var(--accent-color);
            border-radius: 1.5px;
            opacity: 0;
            transition: opacity 0.3s ease;
            transform-origin: bottom center;
            transform: translateZ(0);
        }

        .sound-wave.wave-1 {
            right: 2px;
            height: 5px;
        }

        .sound-wave.wave-2 {
            right: 6px;
            height: 7px;
        }

        .sound-wave.wave-3 {
            right: 10px;
            height: 5px;
        }

        .phone-icon:hover .sound-wave {
            opacity: 1;
        }

        .phone-icon:hover .wave-1 {
            animation: wavePulse 0.6s ease-in-out infinite;
        }

        .phone-icon:hover .wave-2 {
            animation: wavePulse 0.6s ease-in-out infinite 0.1s;
        }

        .phone-icon:hover .wave-3 {
            animation: wavePulse 0.6s ease-in-out infinite 0.2s;
        }

        @keyframes phoneShake {
            0%, 100% { transform: rotate(0deg); }
            10%, 30%, 50%, 70%, 90% { transform: rotate(-4deg); }
            20%, 40%, 60%, 80% { transform: rotate(4deg); }
        }

        @keyframes wavePulse {
            0%, 100% { transform: scaleY(1); opacity: 0.9; }
            50% { transform: scaleY(1.8); opacity: 0.5; }
        }

        .wechat-icon {
            position: relative;
            cursor: pointer;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            will-change: transform;
        }

        .wechat-icon img {
            transform: translateZ(0);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .wechat-icon:hover img {
            transform: scale(1);
            animation: wechatElastic 0.5s ease-out forwards;
        }

        .wechat-icon .red-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 8px;
            height: 8px;
            background-color: #ff4757;
            border-radius: 50%;
            opacity: 0;
            transform: scale(0);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .wechat-icon:hover .red-dot {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes wechatElastic {
            0% { transform: scale(1); }
            30% { transform: scale(1.15); }
            50% { transform: scale(0.95); }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .contact-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .contact-label {
            font-size: 14px;
            color: var(--light-text);
            white-space: nowrap;
        }
        
        .contact-value {
            font-size: 18px;
            font-weight: 500;
            color: var(--accent-color);
        }
        
        /* 留言表单区 */
        .form-section {
            padding: 40px 0 80px;
        }
        
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .form-title {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 40px;
        }
        
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        
        .form-group {
            position: relative;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--light-text);
            margin-bottom: 10px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px 0;
            border: none;
            border-bottom: 1px solid var(--border-color);
            background-color: transparent;
            font-size: 16px;
            color: var(--text-color);
            transition: border-color 0.3s ease;
            resize: none;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        
        .form-group textarea {
            min-height: 120px;
            font-family: inherit;
        }
        
        .submit-btn {
            padding: 15px 30px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .submit-btn:hover {
            background-color: var(--text-color);
            transform: translateY(-2px);
        }
        
        /* 社交媒体区 */
        .social-section {
            padding: 40px 0 100px;
        }
        
        .social-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        
        .social-title {
            font-size: 18px;
            color: var(--light-text);
            margin-bottom: 30px;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 40px;
        }
        
        .social-link {
            font-size: 32px;
            color: var(--light-text);
            transition: color 0.3s ease;
            text-decoration: none;
        }
        
        .social-link:hover {
            color: var(--accent-color);
        }
        
        /* 页脚 */
        .footer {
            padding: 100px 0;
            background-color: var(--primary-color);
        }
        
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
        }
        
        .footer-left {
            flex: 1;
        }
        
        .footer-right {
            flex: 1;
            text-align: right;
        }
        
        .footer-left h3,
        .footer-right h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .contact-info {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .contact-info span {
            color: var(--light-text);
            font-size: 14px;
        }
        
        .footer-right a {
            color: var(--light-text);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer-right a:hover {
            color: var(--accent-color);
        }
        
        .social-links {
            display: flex;
            gap: 20px;
            justify-content: flex-end;
        }
        
        .social-links a {
            font-size: 20px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .copyright {
            text-align: center;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
            color: var(--light-text);
            font-size: 14px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-menu {
                position: fixed;
                top: 80px;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                align-items: center;
                padding: 30px 0;
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
                transform: translateY(-150%);
                transition: transform 0.3s ease;
                z-index: 999;
            }
            
            .nav-menu.active {
                transform: translateY(0);
            }
            
            .hamburger {
                display: block;
            }
            
            .page-title {
                font-size: 36px;
            }
            
            .contact-item {
                flex-direction: column;
                text-align: center;
            }
            
            .social-links {
                gap: 20px;
            }
            
            .footer-content {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }
        
        @media (max-width: 480px) {
            .page-title {
                font-size: 28px;
            }
            
            .social-links {
                gap: 15px;
            }
            
            .social-link {
                font-size: 24px;
            }
        }
        
        /* 滚动动画 */
        .fade-in {
            opacity: 0;
            transform: translateY(10px);
            transition: all 1s ease-out;
        }
        
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <script>
        // 导航栏滚动效果 - 使用节流优化性能
        let lastScrollY = 0;
        let ticking = false;
        
        window.addEventListener('scroll', function() {
            lastScrollY = window.scrollY;
            if (!ticking) {
                window.requestAnimationFrame(function() {
                    const navbar = document.getElementById('navbar');
                    if (lastScrollY > 50) {
                        navbar.classList.add('scrolled');
                    } else {
                        navbar.classList.remove('scrolled');
                    }
                    ticking = false;
                });
                ticking = true;
            }
        });
        
        // 汉堡菜单
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.getElementById('navMenu');
        
        hamburger.addEventListener('click', function() {
            navMenu.classList.toggle('active');
        });
        
        // 滚动动画 - 使用Intersection Observer优化性能
        const fadeElements = document.querySelectorAll('.fade-in');
        
        const observerOptions = {
            root: null,
            rootMargin: '0px 0px -50px 0px',
            threshold: 0.1
        };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting && !entry.target.classList.contains('visible')) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);
        
        fadeElements.forEach(element => {
            observer.observe(element);
        });
        
        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                    navMenu.classList.remove('active');
                }
            });
        });
        
        // 表单提交
        const contactForm = document.getElementById('contactForm');
        contactForm.addEventListener('submit', function(e) {
            e.preventDefault();
            // 表单提交逻辑
            alert('留言已发送！我会尽快回复您。');
            contactForm.reset();
        });
    </script>
